version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Madrid
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      npm-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:30'
      timezone: Europe/Madrid
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - github-actions
    groups:
      actions:
        patterns:
          - '*'
